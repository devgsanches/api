services:
  db:
    image: postgres:16-alpine
    container_name: devclub_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: 1q2w3e4r
      POSTGRES_DB: devclub
    ports:
      - '5432:5432'
    volumes:
      - devclub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d devclub']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  devclub_pgdata:
